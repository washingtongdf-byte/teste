<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Cotação | Jobren Transportes</title>
    <style>
        :root { --primary-color: #007bff; --bg-dark: #0b0b0b; --card-bg: #161616; --text-color: #ffffff; --input-bg: #222; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text-color); margin: 0; padding: 20px; }
        .form-card { background: var(--card-bg); padding: 40px; border-radius: 16px; width: 100%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        h2 { color: var(--primary-color); text-transform: uppercase; margin-bottom: 25px; text-align: center; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #bbb; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; background: var(--input-bg); border: 1px solid #444; border-radius: 8px; color: white; font-size: 15px; box-sizing: border-box; }
        .row { display: flex; flex-wrap: wrap; gap: 15px; }
        .col-6 { flex: 1 1 calc(50% - 15px); min-width: 250px; }
        .col-lg-12 { flex: 1 1 100%; }
        button { width: 100%; padding: 16px; background-color: var(--primary-color); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #444; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="form-card">
        <h2>Cotação de Frete</h2>
        <form id="leadForm">
            <div class="row">
                <div class="col-6">
                    <label>Origem</label>
                    <input type="text" id="origem" placeholder="Ex.: São Paulo - SP" required>
                </div>
                <div class="col-6">
                    <label>Destino</label>
                    <input type="text" id="destino" placeholder="Ex.: Rio de Janeiro - RJ" required>
                </div>
                <div class="col-6">
                    <label>Nome</label>
                    <input type="text" id="nome" placeholder="Seu nome" required>
                </div>
                <div class="col-6">
                    <label>Telefone/Celular</label>
                    <input type="tel" id="telefone" placeholder="(99) 99999-9999" required>
                </div>
                <div class="col-6">
                    <label>E-mail (Opcional)</label>
                    <input type="email" id="email" placeholder="seu@email.com">
                </div>
                <div class="col-6">
                    <label>Serviço</label>
                    <select id="tipoServico" required>
                        <option value="" disabled selected>O que você precisa?</option>
                        <option value="Transporte de cargas">Transporte de cargas</option>
                        <option value="Transporte fracionado">Transporte fracionado</option>
                        <option value="Entregas urgentes">Entregas urgentes</option>
                        <option value="Mudanca">Mudança</option>
                    </select>
                </div>
                <div class="col-lg-12">
                    <label>Detalhes da Carga</label>
                    <textarea id="mensagem" rows="3" required></textarea>
                </div>
                <div class="col-lg-12">
                    <button type="submit" id="btn-submit">ENVIAR COTAÇÃO</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        const SUPABASE_URL = "https://zsciluvxnrwvviudnmak.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Mt2xXgAjpmy58SEu2HNs3Q_QcK_yvXn";

        document.getElementById("leadForm").addEventListener("submit", async function(e){
            e.preventDefault();
            const btn = document.getElementById("btn-submit");
            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            // Montando os dados exatamente como estão na sua tabela (imagem)
            const data = {
                nome: document.getElementById("nome").value,
                telefone: document.getElementById("telefone").value,
                mensagem: document.getElementById("mensagem").value,
                servico: document.getElementById("tipoServico").value,
                email: document.getElementById("email").value || null, // Se vazio, envia nulo
                origem: document.getElementById("origem").value,
                destino: document.getElementById("destino").value,
                pagina: window.location.href,
                status: 'novo'
            };

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/leads`, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Prefer": "return=minimal"
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    alert("Solicitação enviada com sucesso!");
                    document.getElementById("leadForm").reset();
                } else {
                    const errorData = await response.json();
                    console.error("Erro Supabase:", errorData);
                    alert("Erro ao enviar: " + errorData.message);
                }
            } catch (err) {
                alert("Erro de conexão com o servidor.");
            } finally {
                btn.disabled = false;
                btn.innerText = "ENVIAR COTAÇÃO";
            }
        });
    </script>
</body>
</html>
